<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>米克師 IG 圖文</title>
  <style>
    :root { --cream:#fbf4e7; --paper:#fffdfa; --coffee:#5b3024; --line:#d9b77f; }
    * { box-sizing:border-box; }
    body { margin:0; background:#ddd; font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif; }
    .slide { position:relative; width:1080px; height:1350px; overflow:hidden; background:var(--cream); color:var(--coffee); }
    .slide::after { content:""; position:absolute; left:-100px; right:-100px; bottom:-560px; height:720px; border:2px solid rgba(91,48,36,.45); border-radius:50%; pointer-events:none; }
    .paper { position:absolute; inset:150px 82px 130px; padding:112px 84px 88px; background:var(--paper); border-radius:30px; box-shadow:0 18px 0 rgba(91,48,36,.10); text-align:center; }
    .tape { position:absolute; top:-32px; left:50%; width:350px; height:72px; transform:translateX(-50%) rotate(-1deg); background:#e7ce9d; opacity:.9; }
    .emoji { margin:0 0 32px; font-size:72px; line-height:1; }
    h1 { margin:0; font-size:78px; line-height:1.25; font-weight:800; letter-spacing:1px; }
    .divider { width:72%; margin:48px auto; border-top:4px dashed var(--line); }
    p { margin:0; font-size:40px; line-height:1.65; font-weight:400; }
    .handle { position:absolute; z-index:1; bottom:45px; width:100%; text-align:center; font-size:30px; color:#764637; }
  </style>
</head>
<body>
  <main class="slide">
    <section class="paper">
      <div class="tape"></div>
      <p class="emoji">🧠</p>
      <h1>學生一直亂按測驗，<br>怎麼辦？</h1>
      <div class="divider"></div>
      <p>把「選答案」和「送出檢測」分開，<br>讓孩子慢下來思考。</p>
    </section>
    <footer class="handle">@spedmix2025</footer>
  </main>
</body>
</html>
